name: Post Daily Digest Issue

on:
  push:
    branches: [main]
    paths:
      - '2026-*/**'
      - '2027-*/**'
      - '2028-*/**'

permissions:
  contents: read
  issues: write

jobs:
  post-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find latest report and create issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the most recently added report file from this push
          REPORT=$(git diff --name-only HEAD~1 HEAD | grep -E '^2[0-9]{3}-[0-9]{2}/2[0-9]{3}-[0-9]{2}-[0-9]{2}\.md$' | sort -r | head -1)

          if [ -z "$REPORT" ]; then
            echo "No new report file found in this push, skipping."
            exit 0
          fi

          DATE=$(basename "$REPORT" .md)
          MONTH=$(basename "$(dirname "$REPORT")")

          # Extract summary from frontmatter
          SUMMARY=$(sed -n '/^---$/,/^---$/p' "$REPORT" | grep '^summary:' | sed 's/^summary: *"//;s/"$//')

          # Extract TLDR section (bullet points between "## TLDR" and next "---")
          TLDR=$(sed -n '/^## TLDR$/,/^---$/p' "$REPORT" | grep '^\- ' | head -10)

          # Ensure daily-digest label exists
          gh label create daily-digest --color "f59e0b" --description "Daily AI news digest" --force 2>/dev/null || true

          # Build issue body
          BODY=$(cat <<EOF
          ## Morning AI Daily — ${DATE}

          ${SUMMARY}

          ### Top Stories

          ${TLDR}

          ---

          [Read full report](https://octo-patch.github.io/morning-ai-daily/${MONTH}/${DATE}) | [Browse all reports](https://octo-patch.github.io/morning-ai-daily/)

          *Auto-generated by [MorningAI](https://github.com/octo-patch/MorningAI). Watch this repo for daily notifications.*
          EOF
          )

          gh issue create \
            --title "Morning AI Daily — ${DATE}" \
            --body "$BODY" \
            --label "daily-digest"
