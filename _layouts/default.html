<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <nav>
    <a href="{{ '/' | relative_url }}" class="nav-brand">Morning <span class="nav-accent">AI</span> Daily</a>
    <div class="nav-links">
      <a href="https://github.com/octo-patch/morning-ai-daily" target="_blank" rel="noopener">GitHub</a>
      <a href="https://github.com/octo-patch/MorningAI" target="_blank" rel="noopener">Skill</a>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>Generated by <a href="https://github.com/octo-patch/MorningAI">MorningAI</a> &middot; <a href="https://github.com/octo-patch/morning-ai-daily">Source</a></p>
  </footer>

  <script>
  document.addEventListener('DOMContentLoaded', function() {
    // Filter buttons
    var buttons = document.querySelectorAll('.filter-btn');
    var cards = document.querySelectorAll('.news-card');
    buttons.forEach(function(btn) {
      btn.addEventListener('click', function() {
        var filter = this.getAttribute('data-filter');
        buttons.forEach(function(b) { b.classList.remove('active'); });
        this.classList.add('active');
        cards.forEach(function(card) {
          if (filter === 'all' || card.getAttribute('data-type') === filter) {
            card.removeAttribute('data-hidden');
          } else {
            card.setAttribute('data-hidden', 'true');
          }
        });
      });
    });

    // Calendar
    var calDays = document.getElementById('calendar-days');
    if (!calDays) return;

    var reports = {
      {% assign all_reports = site.pages | where: "layout", "report" %}
      {% for r in all_reports %}
      "{{ r.date | date: '%Y-%m-%d' }}": {
        url: "{{ r.url | relative_url }}",
        summary: {{ r.summary | jsonify }},
        total: {{ r.stats.total | default: 0 }}
      }{% unless forloop.last %},{% endunless %}
      {% endfor %}
    };

    var baseUrl = "{{ site.baseurl }}";
    var today = new Date();
    // Start with the latest report's month
    var dates = Object.keys(reports).sort().reverse();
    var startDate = dates.length ? new Date(dates[0] + 'T00:00:00') : today;
    var currentYear = startDate.getFullYear();
    var currentMonth = startDate.getMonth();

    function renderCalendar(year, month) {
      var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      document.getElementById('calendar-month-label').textContent = months[month] + ' ' + year;
      calDays.innerHTML = '';

      var firstDay = new Date(year, month, 1).getDay();
      var daysInMonth = new Date(year, month + 1, 0).getDate();
      var todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');

      for (var i = 0; i < firstDay; i++) {
        var empty = document.createElement('div');
        empty.className = 'calendar-day calendar-day--empty';
        calDays.appendChild(empty);
      }

      for (var d = 1; d <= daysInMonth; d++) {
        var dateStr = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
        var el = document.createElement('div');
        el.className = 'calendar-day';

        if (reports[dateStr]) {
          el.className += ' calendar-day--has-report';
          var a = document.createElement('a');
          a.href = reports[dateStr].url;
          a.textContent = d;
          a.title = reports[dateStr].summary;
          el.appendChild(a);

          (function(ds) {
            el.addEventListener('mouseenter', function() {
              var detail = document.getElementById('calendar-detail');
              detail.innerHTML = '<strong>' + ds + '</strong> — ' + reports[ds].summary + ' (' + reports[ds].total + ' items)<br><a href="' + reports[ds].url + '">View report &rarr;</a>';
              detail.classList.add('visible');
            });
          })(dateStr);
        } else {
          el.textContent = d;
        }

        if (dateStr === todayStr) {
          el.className += ' calendar-day--today';
        }

        calDays.appendChild(el);
      }
    }

    renderCalendar(currentYear, currentMonth);

    document.getElementById('cal-prev').addEventListener('click', function() {
      currentMonth--;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      renderCalendar(currentYear, currentMonth);
    });
    document.getElementById('cal-next').addEventListener('click', function() {
      currentMonth++;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      renderCalendar(currentYear, currentMonth);
    });

    calDays.addEventListener('mouseleave', function() {
      document.getElementById('calendar-detail').classList.remove('visible');
    });
  });
  </script>
</body>
</html>
