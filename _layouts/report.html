<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: page.date }} — {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <nav>
    <a href="{{ '/' | relative_url }}" class="nav-name"><span class="nav-prompt">$</span> morning-ai</a>
    <div class="nav-links">
      <a href="https://github.com/octo-patch/morning-ai-daily" target="_blank" rel="noopener">reports &#x2197;</a>
      <a href="https://github.com/octo-patch/MorningAI" target="_blank" rel="noopener">skill &#x2197;</a>
      <a href="https://github.com/octo-patch" target="_blank" rel="noopener">github &#x2197;</a>
    </div>
  </nav>

  <main>
    <a href="{{ '/' | relative_url }}" class="back-link">&larr; back to all reports</a>
    <div class="report-header">
      <h1>{{ page.title | default: "Daily Report" }}</h1>
    </div>
    <div class="report-content">
      {{ content }}
    </div>
  </main>

  <footer>
    <p>automated AI news tracking by morning-ai</p>
    <a href="https://github.com/octo-patch">github.com/octo-patch</a>
  </footer>
</body>
</html>
